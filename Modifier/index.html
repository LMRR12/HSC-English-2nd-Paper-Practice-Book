        container.innerHTML = `
            <h3>Question No. ${q.id}</h3>
            <div class="passage">${passageHtml}</div>
        `;

        if (!isSubmitted) {
            setupInputListeners();
            scoreBoard.style.display = "none";
            document.getElementById("evaluateActionBtn").disabled = false;
        } else {
            showQuestionScore(q);
            document.getElementById("evaluateActionBtn").disabled = true;
        }
    }

    function setupInputListeners() {
        const inputs = Array.from(document.querySelectorAll('.gap-input'));
        inputs.forEach((input, idx) => {
            input.addEventListener('input', (e) => {
                const sKey = `${e.target.dataset.qid}_${e.target.dataset.gap}`;
                studentAnswers[sKey] = e.target.value;
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === "ArrowRight") {
                    if (idx < inputs.length - 1) inputs[idx + 1].focus();
                } else if (e.key === "ArrowLeft") {
                    if (idx > 0) inputs[idx - 1].focus();
                } else if (e.key === "Enter") {
                    e.preventDefault();
                    evaluateCurrentQuestion();
                }
            });
        });
    }

    function evaluateCurrentQuestion() {
        const q = questionsData[currentQuestionIndex];
        evaluatedQuestions[q.id] = true;
        renderQuestion();
    }

    function showQuestionScore(q) {
        let correctAnswersCount = 0;
        const keys = ['a','b','c','d','e','f','g','h','i','j'];

        keys.forEach(k => {
            const sKey = `${q.id}_${k}`;
            const studentVal = (studentAnswers[sKey] || "").toLowerCase().trim();
            const officialValidChoices = q.answers[k].map(opt => opt.toLowerCase().trim());
            
            if (officialValidChoices.includes(studentVal)) {
                correctAnswersCount++;
            }
        });

        const marksObtained = correctAnswersCount * 0.5;
        scoreBoard.style.display = "block";
        scoreBoard.innerHTML = `
            <div class="score-text">Question ${q.id} Evaluation Result</div>
            <p style="margin: 5px 0 0 0; font-size:1.05rem;">
                Score: <strong>${marksObtained.toFixed(1)} / 5.0</strong> (Correct: <strong>${correctAnswersCount} / 10</strong>)
            </p>
        `;
    }

    function resetCurrentQuestion() {
        const q = questionsData[currentQuestionIndex];
        const keys = ['a','b','c','d','e','f','g','h','i','j'];
        
        keys.forEach(k => {
            delete studentAnswers[`${q.id}_${k}`];
        });
        delete evaluatedQuestions[q.id];
        
        renderQuestion();
    }

    function navigate(direction) {
        currentQuestionIndex += direction;
        renderQuestion();
    }

    function jumpToQuestion(index) {
        currentQuestionIndex = parseInt(index);
        renderQuestion();
    }

    initDropdown();
    renderQuestion();
</script>

</body>
</html>
