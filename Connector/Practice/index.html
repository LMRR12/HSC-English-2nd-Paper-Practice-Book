    let currentIdx = 0;
    let isEvaluated = false;
    let userAnswers = {};

    function init() {
        const selector = document.getElementById('questionSelect');
        selector.innerHTML = exercises.map((ex, i) => `<option value="${i}">Question ${ex.id}</option>`).join('');
        renderQuestion();
        
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const modal = document.getElementById('confirmModal');
                if (modal.style.display === 'flex') {
                    evaluateTest();
                } else {
                    triggerSubmitPopup();
                }
            }
        });
    }

    function renderQuestion() {
        isEvaluated = false;
        const container = document.getElementById('exerciseContainer');
        const ex = exercises[currentIdx];
        document.getElementById('questionSelect').value = currentIdx;

        let processedText = ex.text;
        const alphabet = ['a','b','c','d','e','f','g','h','i','j'];
        
        alphabet.forEach(letter => {
            const pattern = new RegExp(`\\(${letter}\\)`, 'g');
            const savedVal = userAnswers[`${currentIdx}_${letter}`] || '';
            processedText = processedText.replace(pattern, 
                `<span class="gap-label">(${letter})</span> <input type="text" class="connector-input" data-letter="${letter}" value="${savedVal}" oninput="saveAnswer('${letter}', this.value)">`
            );
        });

        container.innerHTML = `<div class="passage-box">${processedText}</div><div id="scoreBox"></div>`;
        setupInputNavigation();
    }

    function saveAnswer(letter, val) {
        userAnswers[`${currentIdx}_${letter}`] = val;
    }

    function setupInputNavigation() {
        const inputs = Array.from(document.querySelectorAll('.connector-input'));
        inputs.forEach((input, index) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                if (e.key === 'ArrowLeft' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
        if(inputs.length > 0) inputs[0].focus();
    }

    function navigate(step) {
        let target = currentIdx + step;
        if (target >= 0 && target < exercises.length) {
            currentIdx = target;
            renderQuestion();
        }
    }

    function jumpToQuestion(idx) {
        currentIdx = parseInt(idx);
        renderQuestion();
    }

    function triggerSubmitPopup() {
        document.getElementById('confirmModal').style.display = 'flex';
        document.getElementById('modalConfirmBtn').focus();
    }

    function closeModal() {
        document.getElementById('confirmModal').style.display = 'none';
    }

    function evaluateTest() {
        closeModal();
        if(isEvaluated) return;
        isEvaluated = true;

        const ex = exercises[currentIdx];
        const alphabet = ['a','b','c','d','e','f','g','h','i','j'];
        let correctCount = 0;
        let processedText = ex.text;

        alphabet.forEach(letter => {
            const rawUserVal = userAnswers[`${currentIdx}_${letter}`] || '';
            const userVal = rawUserVal.trim().toLowerCase();
            const validOptions = ex.answers[letter].map(a => a.trim().toLowerCase());
            
            let displayHTML = '';
            if (validOptions.includes(userVal)) {
                correctCount++;
                displayHTML = `<span class="review-word word-correct">${rawUserVal}</span>`;
            } else {
                const incorrectSpan = userVal ? `<span class="review-word word-incorrect">${rawUserVal}</span> ` : '';
                displayHTML = `${incorrectSpan}<span class="review-word word-actual">${ex.answers[letter].join(' / ')}</span>`;
            }

            const pattern = new RegExp(`\\(${letter}\\)`, 'g');
            processedText = processedText.replace(pattern, `<span class="gap-label">(${letter})</span> ${displayHTML}`);
        });

        const totalPoints = correctCount * 0.5;
        const container = document.getElementById('exerciseContainer');
        
        container.innerHTML = `
            <div class="score-display">Evaluated Score: ${totalPoints.toFixed(1)} / 5.0 marks (${correctCount}/10 correct items)</div>
            <div class="passage-box">${processedText}</div>
        `;
    }

    window.onload = init;
</script>
