<div class="reading-progress"></div>

<script src="script.js"></script>

<script>

const progress=document.querySelector(".reading-progress");

let hideTimer;

function updateProgress(){

    const scrollTop=window.scrollY;

    const maxHeight=document.documentElement.scrollHeight-window.innerHeight;

    const percent=maxHeight<=0?0:scrollTop/maxHeight;

    progress.style.transform=`scaleY(${percent})`;
    progress.style.height="100vh";

}

function showProgress(){

    progress.style.opacity="1";

    progress.style.boxShadow=`
        0 0 10px rgba(59,130,246,.95),
        0 0 22px rgba(59,130,246,.75),
        0 0 40px rgba(59,130,246,.55)
    `;

    clearTimeout(hideTimer);

    hideTimer=setTimeout(()=>{

        progress.style.opacity=".25";

        progress.style.boxShadow=`
            0 0 6px rgba(59,130,246,.35),
            0 0 12px rgba(59,130,246,.20)
        `;

    },1000);

}

window.addEventListener("scroll",()=>{

    updateProgress();

    showProgress();

});

window.addEventListener("resize",updateProgress);

updateProgress();

showProgress();

</script>




</body>
