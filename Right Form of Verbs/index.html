let currentIndex = 0;

// Setup dropdown options instantly
const selectEl = document.getElementById('question-select');
dataset.forEach((q, idx) => {
    let opt = document.createElement('option');
    opt.value = idx;
    opt.innerHTML = `Question ${q.id}`;
    selectEl.appendChild(opt);
});

function renderQuestion(index) {
    currentIndex = index;
    document.getElementById('question-select').value = index;
    document.getElementById('question-title').innerText = `Question ${dataset[index].id} of ${dataset.length}`;
    
    // Clear alerts
    document.getElementById('score').innerText = "";
    const resDiv = document.getElementById('result-passage');
    resDiv.style.display = 'none';
    resDiv.innerHTML = "";
    
    // Setup Navigation Button Status
    document.getElementById('btn-prev').disabled = (index === 0);
    document.getElementById('btn-next').disabled = (index === dataset.length - 1);

    const q = dataset[index];
    const container = document.getElementById('passage-container');
    container.innerHTML = '';
    
    // Split the text structure safely by tags: (a) through (j)
    const parts = q.text.split(/(\([a-j]\))/);
    let blankCounter = 0;
    
    parts.forEach(part => {
        if (/^\([a-j]\)$/.test(part)) {
            const letter = part.substring(1, 2); 
            const verbClue = q.verbs[blankCounter] || ""; 
            
            // Build the clean structured component node layout
            const wrapper = document.createElement('span');
            wrapper.className = 'gap-wrapper';
            
            const label = document.createElement('span');
            label.className = 'gap-label';
            label.textContent = `(${letter})`;
            
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'blank-input';
            input.id = `blank-${blankCounter}`;
            input.dataset.index = blankCounter;
            
            const clue = document.createElement('span');
            clue.className = 'clue-verb';
            clue.textContent = `(${verbClue})`;
            
            wrapper.appendChild(label);
            wrapper.appendChild(input);
            wrapper.appendChild(clue);
            
            container.appendChild(wrapper);
            blankCounter++;
        } else {
            container.appendChild(document.createTextNode(part));
        }
    });
    
    setupInputNavigation();
}

function setupInputNavigation() {
    const inputs = document.querySelectorAll('.blank-input');
    inputs.forEach(input => {
        input.addEventListener('keydown', function(e) {
            let currentIdx = parseInt(this.getAttribute('data-index'));
            if (e.key === 'ArrowRight') {
                let nextInput = document.getElementById(`blank-${currentIdx + 1}`);
                if (nextInput) nextInput.focus();
            } else if (e.key === 'ArrowLeft') {
                let prevInput = document.getElementById(`blank-${currentIdx - 1}`);
                if (prevInput) prevInput.focus();
            }
        });
    });
}

function changeQuestion(step) {
    let target = currentIndex + step;
    if (target >= 0 && target < dataset.length) {
        renderQuestion(target);
    }
}

function jumpToQuestion(index) {
    renderQuestion(parseInt(index));
}

function resetQuestion() {
    renderQuestion(currentIndex);
}

function checkAnswers() {
    const q = dataset[currentIndex];
    let correctCount = 0;
    let totalBlanks = 10;
    
    const resDiv = document.getElementById('result-passage');
    resDiv.innerHTML = '<strong>Full Passage Context:</strong><br><br>';
    
    const parts = q.text.split(/(\([a-j]\))/);
    let blankCounter = 0;
    
    parts.forEach(part => {
        if (/^\([a-j]\)$/.test(part)) {
            let userInput = document.getElementById(`blank-${blankCounter}`).value.trim().toLowerCase();
            let primaryAns = q.answers[blankCounter].toLowerCase();
            
            let validAnswers = primaryAns.split('/').map(s => s.trim());
            
            if (q.altAnswers && q.altAnswers[blankCounter]) {
                validAnswers.push(q.altAnswers[blankCounter].toLowerCase());
            }
            if (q.altAnswers && q.altAnswers[blankCounter + '.1']) {
                validAnswers.push(q.altAnswers[blankCounter + '.1'].toLowerCase());
            }
            
            let isCorrect = validAnswers.some(ans => userInput === ans);
            
            if (isCorrect) {
                correctCount++;
                const correctSpan = document.createElement('span');
                correctSpan.className = 'correct-ans';
                correctSpan.textContent = ` ${q.answers[blankCounter]} `;
                resDiv.appendChild(correctSpan);
            } else {
                let studentDisplay = userInput ? userInput : "";
                
                const wrongSpan = document.createElement('span');
                wrongSpan.className = 'incorrect-ans';
                wrongSpan.textContent = ` ${studentDisplay} `;
                
                const rightSpan = document.createElement('span');
                rightSpan.className = 'correct-ans';
                rightSpan.textContent = ` (${q.answers[blankCounter]}) `;
                
                resDiv.appendChild(wrongSpan);
                resDiv.appendChild(rightSpan);
            }
            blankCounter++;
        } else {
            resDiv.appendChild(document.createTextNode(part));
        }
    });
    
    let totalMarks = correctCount * 0.5;
    document.getElementById('score').innerHTML = `Evaluated Mark: ${totalMarks.toFixed(1)} / ${(totalBlanks * 0.5).toFixed(1)} (Correct: ${correctCount}/${totalBlanks})`;
    resDiv.style.display = 'block';
}

// Kick off initialization
renderQuestion(0);
</script>
